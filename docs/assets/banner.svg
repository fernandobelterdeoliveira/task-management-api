<svg width="1280" height="360" viewBox="0 0 1280 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Task Management REST API</title>
  <desc id="desc">Dark technology themed banner with Spring Boot green accents and API endpoint cards.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0E0F12"/>
      <stop offset="0.55" stop-color="#202123"/>
      <stop offset="1" stop-color="#0E0F12"/>
    </linearGradient>
    <linearGradient id="accent" x1="170" y1="60" x2="1110" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#10A37F"/>
      <stop offset="1" stop-color="#2B8FFF"/>
    </linearGradient>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.0627 0 0 0 0 0.6392 0 0 0 0 0.498 0 0 0 0.42 0"/>
      <feBlend in="SourceGraphic" mode="screen"/>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#40434A" stroke-width="1" opacity="0.35"/>
    </pattern>
  </defs>

  <rect width="1280" height="360" rx="28" fill="url(#bg)"/>
  <rect width="1280" height="360" rx="28" fill="url(#grid)" opacity="0.65"/>

  <path d="M80 260 C220 105 370 305 510 160 C665 0 800 340 960 145 C1045 42 1135 80 1210 135" stroke="url(#accent)" stroke-width="3" opacity="0.75" filter="url(#softGlow)">
    <animate attributeName="stroke-dasharray" values="8 22;22 8;8 22" dur="6s" repeatCount="indefinite"/>
  </path>

  <g opacity="0.9">
    <circle cx="105" cy="82" r="4" fill="#10A37F">
      <animate attributeName="opacity" values="0.35;1;0.35" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1138" cy="91" r="4" fill="#2B8FFF">
      <animate attributeName="opacity" values="1;0.35;1" dur="3.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1040" cy="286" r="4" fill="#10A37F">
      <animate attributeName="opacity" values="0.45;1;0.45" dur="2.7s" repeatCount="indefinite"/>
    </circle>
  </g>

  <g transform="translate(74 70)">
    <rect x="0" y="0" width="570" height="220" rx="20" fill="#0E0F12" opacity="0.82" stroke="#40434A"/>
    <text x="34" y="62" fill="#F5F7FA" font-family="Inter, Arial, sans-serif" font-size="42" font-weight="700">Task Management REST API</text>
    <text x="36" y="102" fill="#9EA1AA" font-family="Inter, Arial, sans-serif" font-size="20">Clean Java Spring Boot API for managing tasks</text>

    <g transform="translate(36 138)">
      <rect x="0" y="0" width="96" height="34" rx="17" fill="#10A37F" opacity="0.16" stroke="#10A37F"/>
      <text x="18" y="23" fill="#10A37F" font-family="IBM Plex Mono, Menlo, monospace" font-size="14" font-weight="700">CRUD</text>

      <rect x="112" y="0" width="86" height="34" rx="17" fill="#2B8FFF" opacity="0.16" stroke="#2B8FFF"/>
      <text x="134" y="23" fill="#2B8FFF" font-family="IBM Plex Mono, Menlo, monospace" font-size="14" font-weight="700">JPA</text>

      <rect x="214" y="0" width="88" height="34" rx="17" fill="#10A37F" opacity="0.16" stroke="#10A37F"/>
      <text x="237" y="23" fill="#10A37F" font-family="IBM Plex Mono, Menlo, monospace" font-size="14" font-weight="700">H2</text>

      <rect x="318" y="0" width="132" height="34" rx="17" fill="#2B8FFF" opacity="0.16" stroke="#2B8FFF"/>
      <text x="338" y="23" fill="#2B8FFF" font-family="IBM Plex Mono, Menlo, monospace" font-size="14" font-weight="700">VALIDATION</text>
    </g>
  </g>

  <g transform="translate(735 58)" font-family="IBM Plex Mono, Menlo, monospace">
    <rect x="0" y="0" width="430" height="244" rx="18" fill="#202123" opacity="0.92" stroke="#40434A"/>
    <rect x="22" y="24" width="386" height="42" rx="10" fill="#0E0F12" stroke="#40434A"/>
    <text x="42" y="51" fill="#10A37F" font-size="16" font-weight="700">GET</text>
    <text x="96" y="51" fill="#F5F7FA" font-size="16">/api/tasks</text>

    <rect x="22" y="78" width="386" height="42" rx="10" fill="#0E0F12" stroke="#40434A"/>
    <text x="42" y="105" fill="#2B8FFF" font-size="16" font-weight="700">POST</text>
    <text x="104" y="105" fill="#F5F7FA" font-size="16">/api/tasks</text>

    <rect x="22" y="132" width="386" height="42" rx="10" fill="#0E0F12" stroke="#40434A"/>
    <text x="42" y="159" fill="#10A37F" font-size="16" font-weight="700">PUT</text>
    <text x="96" y="159" fill="#F5F7FA" font-size="16">/api/tasks/{id}</text>

    <rect x="22" y="186" width="386" height="42" rx="10" fill="#0E0F12" stroke="#40434A"/>
    <text x="42" y="213" fill="#2B8FFF" font-size="16" font-weight="700">PATCH</text>
    <text x="114" y="213" fill="#F5F7FA" font-size="16">/api/tasks/{id}/status</text>
  </g>

  <g transform="translate(665 180)" opacity="0.82">
    <path d="M0 0 H46" stroke="#10A37F" stroke-width="3"/>
    <path d="M34 -10 L48 0 L34 10" stroke="#10A37F" stroke-width="3" fill="none"/>
  </g>
</svg>
